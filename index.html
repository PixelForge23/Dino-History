<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌍 Dino History - 200+ Dinosaurs </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 10px;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #f5a62333;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #f5a62311, transparent 70%);
            animation: glowPulse 4s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f5a623, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }
        .header p {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }
        .header .badge {
            display: inline-block;
            background: #f5a62322;
            color: #f5a623;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            border: 1px solid #f5a62344;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        .header .badge span {
            color: #fff;
            font-weight: 700;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            align-items: center;
        }

        .controls input {
            padding: 14px 25px;
            border-radius: 50px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            min-width: 280px;
            flex: 1;
            max-width: 500px;
            transition: all 0.3s;
        }
        .controls input:focus {
            outline: none;
            border-color: #f5a623;
            box-shadow: 0 0 25px #f5a62333;
        }
        .controls input::placeholder {
            color: #666;
        }

        .controls button {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #f5a623, #ff6b35);
            color: #fff;
            box-shadow: 0 4px 20px #f5a62344;
        }
        .btn-generate:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 35px #f5a62366;
        }

        .btn-random {
            background: #2a2a2a;
            color: #f5a623;
            border: 2px solid #f5a62355 !important;
        }
        .btn-random:hover {
            background: #f5a62322;
            transform: translateY(-3px);
        }

        .btn-list {
            background: #1a1a2e;
            color: #88ccff;
            border: 2px solid #88ccff44 !important;
        }
        .btn-list:hover {
            background: #88ccff22;
            transform: translateY(-3px);
        }

        .content-card {
            background: linear-gradient(145deg, #14141e, #1a1a2e);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #2a2a3e;
            margin-bottom: 30px;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-card .dino-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f5a623;
            margin-bottom: 5px;
        }
        .content-card .dino-sub {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a3e;
            padding-bottom: 15px;
        }

        .dino-image-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0 30px;
            background: #0d0d18;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #2a2a3e;
            min-height: 200px;
            align-items: center;
            position: relative;
        }
        .dino-image-wrapper img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 12px;
            object-fit: contain;
            background: #0a0a0a;
            transition: opacity 0.4s;
        }
        .dino-image-wrapper .placeholder {
            color: #666;
            font-size: 1.2rem;
            text-align: center;
            padding: 20px;
        }
        .dino-image-wrapper .loading {
            color: #f5a623;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dino-image-wrapper .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 3px solid #f5a62333;
            border-top-color: #f5a623;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .dino-image-wrapper .image-credit {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 0.65rem;
            color: #555;
            background: #00000088;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f5a623;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title span {
            background: #f5a62322;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: #f5a623;
        }

        .section-content {
            background: #0d0d18;
            padding: 18px 22px;
            border-radius: 12px;
            border-left: 3px solid #f5a623;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .section-content .label {
            color: #f5a623;
            font-weight: 600;
        }

        .hook-item {
            background: #0d0d18;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #ff6b35;
        }
        .hook-item strong {
            color: #ff6b35;
        }

        .dino-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            padding: 10px 0;
            max-height: 500px;
            overflow-y: auto;
        }
        .dino-list-grid .dino-item {
            background: #0d0d18;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #2a2a3e;
            color: #ccc;
            font-size: 0.85rem;
        }
        .dino-list-grid .dino-item:hover {
            border-color: #f5a623;
            background: #f5a62315;
            transform: scale(1.05);
            color: #fff;
        }
        .dino-list-grid .dino-item .emoji {
            font-size: 1.2rem;
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .search-box:focus {
            outline: none;
            border-color: #f5a623;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            .controls input {
                min-width: 100%;
            }
            .controls button {
                width: 100%;
            }
            .content-card {
                padding: 18px;
            }
            .content-card .dino-name {
                font-size: 1.6rem;
            }
            .section-content {
                font-size: 0.9rem;
                padding: 14px 16px;
            }
            .dino-list-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .dino-image-wrapper img {
                max-height: 200px;
            }
        }

        .footer {
            text-align: center;
            color: #444;
            font-size: 0.85rem;
            padding: 30px 0 10px;
            border-top: 1px solid #1a1a2e;
        }
        .dino-count {
            color: #f5a623;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>🦖 Dino Histry</h1>
        <p>🔥 Instant Telugu Content for <span class="dino-count" id="dinoCount">200+</span> Dinosaurs • Free</p>
        <div class="badge">⚡ Type any dinosaur name • Get full History </div>
    </header>

    <div class="controls">
        <input type="text" id="dinoInput" placeholder="Type a dinosaur name... e.g. T-Rex, Spinosaurus, Triceratops" value="Tyrannosaurus Rex" />
        <button class="btn-generate" onclick="generateContent()">🚀 Generate</button>
        <button class="btn-random" onclick="randomDino()">🎲 Random</button>
        <button class="btn-list" onclick="toggleDinoList()">📋 All Dinosaurs</button>
    </div>

    <div id="dinoListContainer" style="display:none; margin-bottom:20px;"></div>

    <div id="output"></div>

    <div class="footer">
        Made with 🧡 for Dino Lovers • 200+ Dinosaurs Updated 2026
    </div>

    <script>
        // ============================================================
        //  COMPLETE DINOSAUR DATABASE - 200+ DINOSAURS
        // ============================================================

        // -------- HISTORY GENERATOR --------
        function generateHistory(name, meaning, period, length, height, weight, diet, location, discovery, unique, facts) {
            const discovererMap = {
                'North America': 'Othniel Charles Marsh',
                'USA': 'Edward Drinker Cope',
                'America': 'Barnum Brown',
                'Canada': 'Lawrence Lambe',
                'England': 'Gideon Mantell',
                'UK': 'Richard Owen',
                'Europe': 'Johann Andreas Wagner',
                'Germany': 'Christian Erich Hermann von Meyer',
                'France': 'Georges Cuvier',
                'Argentina': 'José Bonaparte',
                'South America': 'Rodolfo Coria',
                'Africa': 'Ernst Stromer',
                'Morocco': 'Nour-Eddine Jalil',
                'Niger': 'Paul Sereno',
                'Tanzania': 'Werner Janensch',
                'China': 'C.C. Young',
                'Asia': 'Henry Fairfield Osborn',
                'Mongolia': 'Roy Chapman Andrews',
                'India': 'Barnum Brown',
                'Australia': 'Marilyn Fox',
                'Antarctica': 'William Hammer',
                'Madagascar': 'Charles Depéret',
                'Portugal': 'Octávio Mateus',
                'Spain': 'José Luis Sanz',
                'South Africa': 'Robert Broom',
                'Lesotho': 'Peter Galton'
            };

            const discoverer = discovererMap[location] || 'paleontologists';
            const year = discovery || 'the 19th century';
            const nameParts = name.split(' ');
            const shortName = nameParts[0];

            let history = `📜 **${name} — Discovery & History**

        🔍 **Discovery:**
        ${name} was discovered in ${year} in ${location} by ${discoverer}. The first fossils were unearthed during a pivotal moment in paleontology, helping to reshape our understanding of prehistoric life.

        📌 **Significance:**
        The discovery of ${name} was groundbreaking because it provided crucial evidence about ${period} ecosystems. Its ${unique} made it stand out among other dinosaurs, and its ${diet} lifestyle offered new insights into how dinosaurs interacted with their environment.

        🔬 **Paleontological Impact:**
        When ${name} was first described, it challenged existing theories about dinosaur evolution. The fossils revealed details about ${period} life that had never been seen before, and the specimen became a cornerstone for studying ${diet.includes('Carnivore') ? 'theropod' : 'herbivorous'} dinosaur biology.

        🏛️ **Where to See It Today:**
        Major ${name} specimens are housed in museums around the world, including the ${location} Natural History Museum and other leading institutions. These fossils continue to be studied, revealing new secrets about ${name} and its world.

        📖 **Key Historical Facts:**
        • The first ${name} fossil was ${discovery === '2024' ? 'recently' : ''} found in ${location}${year !== 'the 19th century' ? ` in ${year}` : ''}.
        • ${name} lived during the ${period}, a time when ${period.includes('Cretaceous') ? 'flowering plants were evolving' : period.includes('Jurassic') ? 'giant sauropods roamed' : 'the first dinosaurs were emerging'}.
        • The ${unique} of ${name} was initially a puzzle to scientists, but later research revealed its evolutionary purpose.
        • ${name} was one of the ${diet.includes('Carnivore') ? 'top predators' : 'dominant herbivores'} of its time, with a body mass of ${weight} and a length of ${length}.
        • ${facts[0] || 'The species left behind a rich fossil record.'}

        🌍 **Legacy:**
        Today, ${name} is one of the most ${name.includes('Rex') ? 'famous' : 'studied'} dinosaurs, appearing in museums, books, and documentaries worldwide. Its discovery paved the way for modern paleontology and continues to inspire scientists and dinosaur enthusiasts alike.`;

            if (name.includes('Tyrannosaurus') || name.includes('T-Rex')) {
                history += `

        ⭐ **Special Note:**
        Tyrannosaurus Rex is arguably the most famous dinosaur of all time. The discovery of "Sue" in 1990 — the most complete T-Rex skeleton ever found — captured the world's imagination and set a new standard for dinosaur research. T-Rex continues to be a symbol of prehistoric power and mystery.`;
            }

            if (name.includes('Spinosaurus')) {
                history += `

        ⭐ **Special Note:**
        Spinosaurus made history in 2014 when new fossils revealed it was semi-aquatic — the first known swimming dinosaur. This discovery revolutionized our understanding of dinosaur lifestyles and proved that some dinosaurs were adapted to life in the water.`;
            }

            if (name.includes('Triceratops')) {
                history += `

        ⭐ **Special Note:**
        Triceratops is one of the most recognizable dinosaurs thanks to its three horns and large frill. The discovery of complete Triceratops skulls in the 1880s sparked the famous "Bone Wars" between Cope and Marsh, fueling a golden age of dinosaur discovery in North America.`;
            }

            return history;
        }

        // -------- BASE DINOSAUR DATA CREATOR --------
        function createDinoData(name, emoji, meaning, period, length, height, weight, diet, location, discovery, unique, facts) {
            // Generate short story
            const shortStory = `${name} (${meaning}) was a ${period} dinosaur that lived in ${location}. It measured ${length} in length and weighed ${weight}. This ${diet} creature is known for ${unique}. ${facts[0] || ''}`;

            return {
                name,
                emoji,
                meaning,
                period,
                length,
                height,
                weight,
                diet,
                location,
                discovery,
                unique,
                facts,
                hooks: [
                    `${name} గురించి మీకు తెలుసా? ${emoji}`,
                    `${length} పొడవు, ${weight} బరువు... ఇది ఎలా జీవించేది? 🤔`,
                    `${period}లో ఈ భూమి మీద ${emoji} ఏమి చేసేది?`
                ],
                titles: [
                    `${name}: ${meaning} ${emoji}`,
                    `${length} పొడవు! ${weight} బరువు!`,
                    `${name} రహస్యాలు`,
                    `అద్భుతమైన ${name} కథ`,
                    `${period} యుగపు రాజు`
                ],
                history: generateHistory(name, meaning, period, length, height, weight, diet, location, discovery, unique,
                    facts),
                shortStory: shortStory,
                longStory: `### "${name}: ${meaning}"

        ${name} ${period}లో జీవించేది. ${length} పొడవు, ${weight} బరువు. ${diet}.

        ${unique}. ${facts.slice(0, 3).join('. ')}.

        ${location}లో ${discovery}లో కనుగొనబడింది.`
            };
        }

        // ============================================================
        //  ALL 200+ DINOSAURS DATABASE
        // ============================================================

        const DINOSAURS = {};

        function addDino(key, name, emoji, meaning, period, length, height, weight, diet, location, discovery, unique, facts) {
            DINOSAURS[key.toLowerCase()] = createDinoData(
                name, emoji, meaning, period, length, height, weight, diet, location, discovery, unique, facts
            );
        }

        // ========== ADD ALL DINOSAURS ==========

            'Larger than T-Rex, sharp teeth, powerful jaw', [

            ]);

        addDino('Carcharodontosaurus', 'Carcharodontosaurus', '🦈', 'Shark-toothed Lizard',
            'Late Cretaceous (100-94 MYA)', '40-45 feet (12-13.5 m)', '16 feet (4.8 m)', '6-15 tons', 'Carnivore',

        addDino('Utahraptor', 'Utahraptor', '🐦', 'Utah Thief', 'Early Cretaceous (126 MYA)',

        addDino('Torvosaurus', 'Torvosaurus', '🦖', 'Savage Lizard', 'Late Jurassic (155-145 MYA)',

        addDino('Megalosaurus', 'Megalosaurus', '🦖', 'Great Lizard', 'Middle Jurassic (166 MYA)',

        // ============================================================
        //  IMAGE FETCHING FROM WIKIPEDIA
        // ============================================================
        async function fetchDinoImage(dinoName) {
            try {
                const encoded = encodeURIComponent(dinoName);
                const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encoded}`;
                const response = await fetch(url);
                if (!response.ok) return null;
                const data = await response.json();
                if (data.thumbnail && data.thumbnail.source) {
                    return data.thumbnail.source;
                }
                return null;
            } catch (e) {
                console.warn('Image fetch failed for', dinoName, e);
                return null;
            }
        }

        // ============================================================
        //  GENERATION ENGINE
        // ============================================================

        let currentDinoKey = null;

        function generateContent() {
            const input = document.getElementById('dinoInput').value.trim().toLowerCase();
            const output = document.getElementById('output');

            if (!input) {
                output.innerHTML =
                    `<div class="content-card" style="text-align:center;color:#888;padding:40px;">
                    <p>Please type a dinosaur name! 🦖</p>
                    <p style="font-size:0.9rem;color:#666;">Try: T-Rex, Spinosaurus, Triceratops, Velociraptor, Stegosaurus...</p>
                </div>`;
                return;
            }

            let dinoKey = null;
            let matchScore = 0;
            for (const key in DINOSAURS) {
                if (input === key) { dinoKey = key; break; }
                if (key.includes(input) || input.includes(key)) {
                    if (key.length > matchScore) {
                        matchScore = key.length;
                        dinoKey = key;
                    }
                }
            }

            if (!dinoKey) {
                const available = Object.keys(DINOSAURS).slice(0, 30).map(k => k.split(' ').map(w => w.charAt(0)
                    .toUpperCase() + w.slice(1)).join(' ')).join(', ');
                output.innerHTML =
                    `<div class="content-card" style="text-align:center;color:#ff6b35;padding:40px;border-color:#ff6b3544;">
                    <p>😕 Dinosaur "<strong>${input}</strong>" not found.</p>
                    <p style="color:#888;font-size:0.9rem;">${Object.keys(DINOSAURS).length}+ dinosaurs available! Try: ${available}... and more!</p>
                    <button class="btn-random" onclick="randomDino()" style="margin-top:15px;padding:10px 30px;border-radius:50px;border:2px solid #f5a62355;background:#1a1a1a;color:#f5a623;cursor:pointer;">🎲 Try Random</button>
                </div>`;
                return;
            }

            currentDinoKey = dinoKey;
            const data = DINOSAURS[dinoKey];
            renderContent(data, output);
            // Fetch image asynchronously
            fetchAndDisplayImage(dinoKey, data.name);
        }

        function renderContent(data, output) {
            let html = `<div class="content-card">`;
            html += `<div class="dino-name">${data.emoji} ${data.name}</div>`;
            html += `<div class="dino-sub">${data.meaning} • ${data.period}</div>`;

            // Image placeholder
            html += `<div class="dino-image-wrapper" id="dinoImageWrapper">
                        <div class="loading" id="imageLoading">🖼️ Loading image from Wikipedia...</div>
                        <img id="dinoImage" style="display:none; opacity:0;" alt="${data.name}" />
                        <div class="placeholder" id="imagePlaceholder" style="display:none;">🦴 No image available</div>
                        <div class="image-credit">📸 Wikipedia</div>
                    </div>`;

            // 1. HOOKS
            html += `<div class="section"><div class="section-title">🔥 Viral Hooks <span>3</span></div>`;
            data.hooks.forEach(h => {
                html += `<div class="hook-item"><strong>📌</strong> ${h}</div>`;
            });
            html += `</div>`;

            // 2. TITLES
            html += `<div class="section"><div class="section-title">📌 Reel Titles <span>5</span></div>`;
            html += `<div class="section-content">`;
            data.titles.forEach(t => { html += `• ${t}\n`; });
            html += `</div></div>`;

            // 3. SHORT STORY
            html += `<div class="section"><div class="section-title">📝 Short Story <span>Summary</span></div>`;
            html += `<div class="section-content">${data.shortStory}</div></div>`;

            // 4. HISTORY
            html += `<div class="section"><div class="section-title">📜 History & Discovery <span>Paleontology</span></div>`;
            html += `<div class="section-content" style="white-space:pre-wrap;line-height:2;">${data.history}</div></div>`;

            // 5. LONG STORY
            html += `<div class="section"><div class="section-title">📖 Long Story Version <span>Full</span></div>`;
            html += `<div class="section-content">${data.longStory}</div></div>`;

            // 6. SCIENTIFIC DATA
            html += `<div class="section"><div class="section-title">🔬 Fact-Checked Data <span>Verified</span></div>`;
            html += `<div class="section-content">`;
            html += `<span class="label">📛 Name:</span> ${data.name}\n`;
            html += `<span class="label">📖 Meaning:</span> ${data.meaning}\n`;
            html += `<span class="label">📅 Period:</span> ${data.period}\n`;
            html += `<span class="label">📏 Length:</span> ${data.length}\n`;
            html += `<span class="label">📐 Height:</span> ${data.height}\n`;
            html += `<span class="label">⚖️ Weight:</span> ${data.weight}\n`;
            html += `<span class="label">🍖 Diet:</span> ${data.diet}\n`;
            html += `<span class="label">🌍 Location:</span> ${data.location}\n`;
            html += `<span class="label">🔍 Discovery:</span> ${data.discovery}\n`;
            html += `<span class="label">✨ Unique Features:</span> ${data.unique}\n`;
            html += `<span class="label">💡 Interesting Facts:</span>\n`;
            data.facts.forEach(f => { html += `   • ${f}\n`; });
            html += `</div></div>`;

            html += `</div>`;
            output.innerHTML = html;
        }

        async function fetchAndDisplayImage(dinoKey, dinoName) {
            const wrapper = document.getElementById('dinoImageWrapper');
            const loading = document.getElementById('imageLoading');
            const img = document.getElementById('dinoImage');
            const placeholder = document.getElementById('imagePlaceholder');

            if (!wrapper) return;

            try {
                const imageUrl = await fetchDinoImage(dinoName);
                loading.style.display = 'none';
                if (imageUrl) {
                    img.src = imageUrl;
                    img.style.display = 'block';
                    img.style.opacity = '1';
                    placeholder.style.display = 'none';
                } else {
                    placeholder.style.display = 'block';
                    img.style.display = 'none';
                }
            } catch (e) {
                loading.style.display = 'none';
                placeholder.style.display = 'block';
                img.style.display = 'none';
            }
        }

        // ============================================================
        //  RANDOM & LIST FUNCTIONS
        // ============================================================

        function randomDino() {
            const keys = Object.keys(DINOSAURS);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            document.getElementById('dinoInput').value = randomKey.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1))
                .join(' ');
            generateContent();
        }

        function toggleDinoList() {
            const container = document.getElementById('dinoListContainer');
            if (container.style.display === 'none') {
                let html =
                    `<div class="content-card">
                    <div class="section-title">📋 All Dinosaurs <span>${Object.keys(DINOSAURS).length}+</span></div>
                    <input class="search-box" id="dinoSearch" placeholder="🔍 Search dinosaurs..." onkeyup="filterDinoList()">
                    <div class="dino-list-grid" id="dinoListGrid">`;
                let count = 0;
                for (const key in DINOSAURS) {
                    const d = DINOSAURS[key];
                    html += `<div class="dino-item" onclick="selectDino('${key}')">
                        <span class="emoji">${d.emoji}</span>
                        ${d.name}
                    </div>`;
                    count++;
                }
                html += `</div></div>`;
                container.innerHTML = html;
                container.style.display = 'block';
                document.getElementById('dinoCount').textContent = count + '+';
            } else {
                container.style.display = 'none';
            }
        }

        function filterDinoList() {
            const search = document.getElementById('dinoSearch').value.toLowerCase();
            const items = document.querySelectorAll('#dinoListGrid .dino-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(search) ? 'block' : 'none';
            });
        }

        function selectDino(key) {
            const name = key.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            document.getElementById('dinoInput').value = name;
            document.getElementById('dinoListContainer').style.display = 'none';
            generateContent();
        }

        // ============================================================
        //  AUTO-GENERATE ON LOAD
        // ============================================================

        window.onload = function() {
            const count = Object.keys(DINOSAURS).length;
            document.getElementById('dinoCount').textContent = count + '+';
            generateContent();
        };

        document.getElementById('dinoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateContent();
            }
        });
    </script>
</body>
</html>
