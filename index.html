        * {

            padding: 0;
            box-sizing: border-box;
        }

        }

        }

            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 10px;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #f5a62333;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #f5a62311, transparent 70%);
            animation: glowPulse 4s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f5a623, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }
        .header p {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

            background: #f5a62322;

            border-radius: 50px;

            border: 1px solid #f5a62344;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        .header .badge span {
            color: #fff;
            font-weight: 700;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            align-items: center;
        }

        .controls input {
            padding: 14px 25px;
            border-radius: 50px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            min-width: 280px;
            flex: 1;
            max-width: 500px;
            transition: all 0.3s;
        }
        .controls input:focus {
            outline: none;
            border-color: #f5a623;
            box-shadow: 0 0 25px #f5a62333;
        }
        .controls input::placeholder {
            color: #666;
        }

        .controls button {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;

        .btn-generate {

            color: #fff;
            box-shadow: 0 4px 20px #f5a62344;
        }
        .btn-generate:hover {
            transform: translateY(-3px) scale(1.02);

        }

        .btn-random {
            background: #2a2a2a;
            color: #f5a623;
            border: 2px solid #f5a62355 !important;
        }
        .btn-random:hover {
            background: #f5a62322;
            transform: translateY(-3px);
        }

        .btn-list {
            background: #1a1a2e;
            color: #88ccff;
            border: 2px solid #88ccff44 !important;
        }
        .btn-list:hover {
            background: #88ccff22;
            transform: translateY(-3px);
        }

            padding: 30px;
            border: 1px solid #2a2a3e;
            margin-bottom: 30px;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }

        .content-card .dino-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f5a623;
            margin-bottom: 5px;
        }
        .content-card .dino-sub {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a3e;
            padding-bottom: 15px;

        .section {
            margin-bottom: 25px;
        }

            font-size: 1.1rem;
            font-weight: 700;
            color: #f5a623;

            align-items: center;

            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: #f5a623;
        }

            background: #0d0d18;

            border-left: 3px solid #f5a623;

            white-space: pre-wrap;
            font-size: 0.95rem;

        .section-content .label {
            color: #f5a623;
            font-weight: 600;
        }

            background: #0d0d18;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #ff6b35;
        }
        .hook-item strong {
            color: #ff6b35;
        }

        .dino-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            padding: 10px 0;
            max-height: 500px;
            overflow-y: auto;
        }
        .dino-list-grid .dino-item {
            background: #0d0d18;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #2a2a3e;
            color: #ccc;
            font-size: 0.85rem;
        }
        .dino-list-grid .dino-item:hover {
            border-color: #f5a623;
            background: #f5a62315;
            transform: scale(1.05);
            color: #fff;
        }
        .dino-list-grid .dino-item .emoji {
            font-size: 1.2rem;
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .search-box:focus {
            outline: none;
            border-color: #f5a623;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .controls input { min-width: 100%; }
            .controls button { width: 100%; }
            .content-card { padding: 18px; }

            .section-content { font-size: 0.9rem; padding: 14px 16px; }

            font-size: 0.85rem;

</head>

        function generateContent() {
            const input = document.getElementById('dinoInput').value.trim().toLowerCase();
            const output = document.getElementById('output');

            if (!input) {
                output.innerHTML = `<div class="content-card" style="text-align:center;color:#888;padding:40px;">
                    <p>Please type a dinosaur name! 🦖</p>
                    <p style="font-size:0.9rem;color:#666;">Try: T-Rex, Spinosaurus, Triceratops, Velociraptor, Stegosaurus...</p>
                </div>`;
                return;
            }

            // Find matching dinosaur
            let dinoKey = null;
            let matchScore = 0;
            for (const key in DINOSAURS) {
                if (input === key) { dinoKey = key; break; }
                if (key.includes(input) || input.includes(key)) {
                    if (key.length > matchScore) {
                        matchScore = key.length;
                        dinoKey = key;
                    }
                }
            }

            if (!dinoKey) {
                const available = Object.keys(DINOSAURS).slice(0, 30).map(k => k.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')).join(', ');
                output.innerHTML = `<div class="content-card" style="text-align:center;color:#ff6b35;padding:40px;border-color:#ff6b3544;">
                    <p>😕 Dinosaur "<strong>${input}</strong>" not found.</p>
                    <p style="color:#888;font-size:0.9rem;">${Object.keys(DINOSAURS).length}+ dinosaurs available! Try: ${available}... and more!</p>
                    <button class="btn-random" onclick="randomDino()" style="margin-top:15px;padding:10px 30px;border-radius:50px;border:2px solid #f5a62355;background:#1a1a1a;color:#f5a623;cursor:pointer;">🎲 Try Random</button>
                </div>`;
                return;
            }

            const data = DINOSAURS[dinoKey];
            renderContent(data, output);
        }

        }

        function toggleDinoList() {
            const container = document.getElementById('dinoListContainer');
            if (container.style.display === 'none') {
                let html = `<div class="content-card">
                    <div class="section-title">📋 All Dinosaurs <span>${Object.keys(DINOSAURS).length}+</span></div>
                    <input class="search-box" id="dinoSearch" placeholder="🔍 Search dinosaurs..." onkeyup="filterDinoList()">
                    <div class="dino-list-grid" id="dinoListGrid">`;
                let count = 0;
                for (const key in DINOSAURS) {
                    const d = DINOSAURS[key];
                    html += `<div class="dino-item" onclick="selectDino('${key}')">
                        <span class="emoji">${d.emoji}</span>
                        ${d.name}
                    </div>`;
                    count++;
                }
                html += `</div></div>`;
                container.innerHTML = html;
                container.style.display = 'block';
                // Update count in header
                document.getElementById('dinoCount').textContent = count + '+';
            } else {
                container.style.display = 'none';
            }
        }

        function filterDinoList() {
            const search = document.getElementById('dinoSearch').value.toLowerCase();
            const items = document.querySelectorAll('#dinoListGrid .dino-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(search) ? 'block' : 'none';
            });
        }

        function selectDino(key) {
            const name = key.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            document.getElementById('dinoInput').value = name;
            document.getElementById('dinoListContainer').style.display = 'none';
            generateContent();
        }

        // ============================================================
        //  AUTO-GENERATE ON LOAD
        // ============================================================

        window.onload = function() {
            const count = Object.keys(DINOSAURS).length;
            document.getElementById('dinoCount').textContent = count + '+';
            generateContent();
        };

        document.getElementById('dinoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateContent();
            }
        });
    </script>
</body>
</html>
